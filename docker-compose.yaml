version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: shopery_postgres
    environment:
      POSTGRES_USER: shopery_user
      POSTGRES_PASSWORD: shopery_pass
      POSTGRES_DB: shopery_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: shopery_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@shopery.com
      PGADMIN_DEFAULT_PASSWORD: StrongAdminPassword
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:7-alpine
    container_name: shopery_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  pgdata:
  pgadmin_data:
  redis_data: