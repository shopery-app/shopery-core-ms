stages:
  - build
  - test
  - deploy

build-job:
  stage: build
  script:
    - echo "Compiling the code..."
    - sleep 5
    - echo "Compile complete."

unit-test-job:
  stage: test
  script:
    - echo "Running unit tests... This will take about 10 seconds."
    - sleep 10
    - echo "Code coverage is 100%"

lint-test-job:
  stage: test
  script:
    - echo "Linting code... This will take about 5 seconds."
    - sleep 5
    - echo "No lint issues found."

snyk_sast:
  image: snyk/snyk:docker
  stage: test
  script:
    - if [ -z "$SNYK_TOKEN" ]; then echo "SNYK_TOKEN is empty"; else echo "SNYK_TOKEN is set"; fi
    - snyk auth "$SNYK_TOKEN"
    - snyk code test
  allow_failure: true


deploy-job:
  stage: deploy
  script:
    - echo "Deploying application..."
    - sleep 5
    - echo "Application successfully deployed."
