spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  liquibase:
    enabled: false

  mail:
    host: smtp.test.com
    port: 587
    username: test@test.com
    password: test-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

application:
  security:
    jwt:
      secret-key: my-secret-key-test
      access-token:
        expiration: 10000
      refresh-token:
        expiration: 100000
  frontend:
    base-url: http://localhost:4200/
  mail:
    from: noreply@shopery-test.com

aws:
  region: us-east-1
  s3:
    bucket-name: test-bucket

AWS_REGION: us-east-1
AWS_S3_BUCKET_NAME: test-bucket
NO_REPLY_SHOPERY_USERNAME: noreply@shopery-test.com
NO_REPLY_SHOPERY_PASSWORD: test-password

stripe:
  secret-key: sk_test_dummy
  webhook-secret: whsec_dummy
  success-url: http://localhost:3000/payment/success?session_id={CHECKOUT_SESSION_ID}
  cancel-url: http://localhost:3000/cart