spring:
  application:
    name: shopery

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/master.yaml

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${NO_REPLY_BREVO_USERNAME}
    password: ${NO_REPLY_BREVO_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      timeout: 2000ms

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token:
        expiration: ${ACCESS_TOKEN_EXPIRATION}
      refresh-token:
        expiration: ${REFRESH_TOKEN_EXPIRATION}
  frontend:
    base-url: ${FRONTEND_BASE_URL}

claude:
  api:
    key: ${CLAUDE_API_KEY}
    url: https://api.anthropic.com/v1/messages
    model: claude-sonnet-4-20250514
    max-tokens: 1024
    version: 2023-06-01

resilience4j:
  ratelimiter:
    instances:
      auth-rate-limiter:
        limitForPeriod: 5
        limitRefreshPeriod: 120s
        timeoutDuration: 100ms

app:
  mail:
    from: ${NO_REPLY_SHOPERY_USERNAME}

aws:
  region: ${AWS_REGION}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME}