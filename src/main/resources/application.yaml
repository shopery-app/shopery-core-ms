spring:
  application:
    name: shopery
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/master.yaml

  mail:
    host: smtp.gmail.com
    port: 465
    username: ${NO_REPLY_USERNAME}
    password: ${NO_REPLY_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
        transport:
          protocol: smtps

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token:
        expiration: 3600000
      refresh-token:
        expiration: 604800000

server:
  port: 8080
