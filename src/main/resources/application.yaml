spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  application:
    name: shopery
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/master.yaml
  mail:
    host: smtp.gmail.com
    port: 465
    username: ${NO_REPLY_USERNAME}
    password: ${NO_REPLY_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
        transport:
          protocol: smtps

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token:
        expiration: ${ACCESS_TOKEN_EXPIRATION}
      refresh-token:
        expiration: ${REFRESH_TOKEN_EXPIRATION}
  frontend:
    base-url: ${FRONTEND_BASE_URL}

server:
  port: 8080

aws:
  region: ${AWS_REGION}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME}
