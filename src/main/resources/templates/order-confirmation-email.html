<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Order Confirmation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f7fb;
            margin: 0;
            padding: 0;
        }
        .container {
            background: white;
            max-width: 700px;
            margin: 30px auto;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #eaeaea;
        }
        h2 {
            color: #333;
            font-weight: 600;
        }
        .order-card {
            background: #fafafa;
            border: 1px solid #e4e4e4;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .order-header {
            font-size: 18px;
            margin-bottom: 12px;
            color: #444;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 8px;
        }
        th {
            text-align: left;
            padding: 8px 0;
            color: #555;
            font-size: 14px;
        }
        td {
            padding: 6px 0;
            color: #333;
        }
        .total {
            margin-top: 8px;
            font-size: 16px;
            font-weight: bold;
            text-align: right;
            color: #000;
        }
        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #777;
            text-align: center;
        }
    </style>
</head>

<body>
<div class="container">

    <h2>Hi <span th:text="${userName}"></span> 👋</h2>
    <p>Thank you for shopping with <strong>Shopery</strong>!
        Your order has been successfully placed. Here are the details:</p>

    <div th:each="order : ${orders}" class="order-card">

        <div class="order-header">
            Order #<span th:text="${order.id}"></span> —
            <span th:text="${order.shop.shopName}"></span>
        </div>

        <table>
            <thead>
            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Subtotal</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${order.items}">
                <td th:text="${item.productName}"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${item.subtotal} + ' $'"></td>
            </tr>
            </tbody>
        </table>

        <div class="total">
            Total: <span th:text="${order.totalPrice}"></span> $
        </div>
    </div>

    <p>If you have any questions, feel free to reply to this email.</p>

    <div class="footer">
        © 2025 Shopery — Thank you for your order ❤️
    </div>

</div>
</body>
</html>
