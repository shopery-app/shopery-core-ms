databaseChangeLog:
  - changeSet:
      id: 10082025_create_addresses_table
      author: Jahangir Alisoy
      changes:
        - createTable:
            tableName: addresses
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: customer_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: address_line1
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: address_line2
                  type: VARCHAR(100)
              - column:
                  name: city
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: postal_code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: is_default
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: addresses
            baseColumnNames: customer_id
            constraintName: fk_addresses_on_customer
            referencedTableName: customers
            referencedColumnNames: id
            onDelete: CASCADE
