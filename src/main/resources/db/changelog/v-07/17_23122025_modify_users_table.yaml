databaseChangeLog:
  - changeSet:
      id: 07_23122025_modify_users_table
      author: Nijat Alizada
      changes:
        - addForeignKeyConstraint:
            baseTableName: user_addresses
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_addresses_users
            onDelete: CASCADE
        - addColumn:
            tableName: users
            columns:
                - column:
                      name: status
                      type: varchar(10)
                      defaultValue: ACTIVE
                      constraints:
                          nullable: false