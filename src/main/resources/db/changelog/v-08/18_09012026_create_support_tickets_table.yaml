databaseChangeLog:
  - changeSet:
      id: 18_09012026_create-support-tickets-table
      author: Jahangir Alisoy
      changes:
        - createTable:
            tableName: support_tickets
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: subject
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: created_by_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: assigned_admin_id
                  type: UUID
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: support_tickets
            baseColumnNames: created_by_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_support_ticket_created_by
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            baseTableName: support_tickets
            baseColumnNames: assigned_admin_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_support_ticket_assigned_admin
            onDelete: SET NULL
