databaseChangeLog:
  - changeSet:
      id: 17082025_create_products_table
      author: Jahangir Alisoy
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: products
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: shop_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_products_shop
                    references: shops(id)
              - column:
                  name: product_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(2000)
              - column:
                  name: current_price
                  type: decimal(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: stock_quantity
                  type: int
                  defaultValueNumeric: "0"
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: varchar(50)
                  defaultValue: "HOME"
                  constraints:
                    nullable: false
              - column:
                  name: condition
                  type: varchar(50)
                  defaultValue: "NEW"
                  constraints:
                    nullable: false
              - column:
                  name: image_url
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
  - changeSet:
      id: 17082025_create_price_history_table
      author: Jahangir Alisoy
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: price_history
      changes:
        - createTable:
            tableName: price_history
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_price_history_product
                    references: products(id)
              - column:
                  name: price
                  type: decimal(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
