databaseChangeLog:
  - changeSet:
      id: 08082025_create_password_reset_tokens_table
      author: Jahangir Alisoy
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: password_reset_tokens
      changes:
        - createTable:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_password_reset_token
              - column:
                  name: expiry_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: user_email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_password_reset_user_email
        - createIndex:
            indexName: idx_password_reset_user_email
            tableName: password_reset_tokens
            columns:
              - column:
                  name: user_email
