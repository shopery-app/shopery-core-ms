databaseChangeLog:
  - changeSet:
      id: 14082025_add_column_to_password_reset_tokens_table
      author: Jahangir Alisoy
      preConditions:
        - onFail: MARK_RAN
        - not:
            columnExists:
              tableName: password_reset_tokens
              columnName: link_last_sent_at
      changes:
        - addColumn:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: link_last_sent_at
                  type: timestamp with time zone
