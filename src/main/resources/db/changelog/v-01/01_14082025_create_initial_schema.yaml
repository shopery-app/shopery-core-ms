databaseChangeLog:
  - changeSet:
      id: 14082025_create_initial_schema
      author: Jahangir Alisoy
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: failed_login_attempts
                  type: int
                  defaultValueNumeric: "0"
                  constraints:
                    nullable: false
              - column:
                  name: account_locked_until
                  type: timestamp with time zone
              - column:
                  name: user_role
                  type: varchar(255)
                  defaultValue: 'CUSTOMER'
                  constraints:
                    nullable: false
              - column:
                  name: profile_photo_url
                  type: varchar(255)
              - column:
                  name: phone
                  type: varchar(255)
              - column:
                  name: date_of_birth
                  type: date

        - createTable:
            tableName: user_addresses
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_addresses_user
                    references: users(id)
              - column:
                  name: address_line1
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: address_line2
                  type: varchar(255)
              - column:
                  name: city
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: postal_code
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: address_type
                  type: varchar(255)
                  defaultValue: 'HOUSE'
                  constraints:
                    nullable: false
              - column:
                  name: is_default
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

        - createTable:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expiry_date
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: user_email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true

        - createTable:
            tableName: verification_tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: expiry_date
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: user_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: user_email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: progress
                  type: varchar(255)
                  defaultValue: 'PENDING'
                  constraints:
                    nullable: false
              - column:
                  name: attempt_count
                  type: int
                  defaultValueNumeric: "0"
                  constraints:
                    nullable: false
              - column:
                  name: code_last_sent_at
                  type: timestamp with time zone
