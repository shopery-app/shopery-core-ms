databaseChangeLog:
  - changeSet:
      id: 25102025_create_blogs_table
      author: Nijat Alizada
      changes:
        - createTable:
            tableName: blogs
            columns:
              - column:
                  name: "id"
                  type: "UUID"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: "user_id"
                  type: "UUID"
                  constraints:
                    nullable: false
                    foreignKeyName: "fk_blog_user"
                    references: "users(id)"
              - column:
                  name: "blog_title"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "content"
                  type: "TEXT"
                  constraints:
                    nullable: false
              - column:
                  name: "image_url"
                  type: "VARCHAR(512)"
                  constraints:
                    nullable: true
              - column:
                  name: "created_at"
                  type: "TIMESTAMP"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: "updated_at"
                  type: "TIMESTAMP"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false